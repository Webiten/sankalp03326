name: Update GitHub profile

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Generate profile assets
        env:
          GITHUB_USERNAME: ${{ github.repository_owner }}
        run: python scripts/build.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/source-prepped.png data/contributions.json output/ascii-preview.txt output/*.svg
          if git diff --cached --quiet; then
            echo "No generated changes."
          else
            git commit -m "Update generated profile assets"
            git push
          fi
